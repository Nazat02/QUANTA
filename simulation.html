<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QUANTA — Quantum State Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* ── Deep Space × Electric Blue palette ── */
  --ink:        #020408;
  --ink-2:      #050810;
  --ink-3:      #080d18;
  --ink-4:      #0d1424;

  /* Blue spectrum — electric cyan-blue signature */
  --gold:       #3b9eff;
  --gold-bright:#6bbfff;
  --gold-warm:  #a8d8ff;
  --gold-dim:   #1a4a8a;
  --gold-glow:  rgba(59,158,255,0.18);
  --gold-subtle:rgba(59,158,255,0.07);
  --gold-border:rgba(59,158,255,0.18);
  --gold-hi:    rgba(59,158,255,0.35);

  /* Neutral frosts — cooler blue-white */
  --frost:      rgba(210,230,255,0.92);
  --frost-mid:  rgba(210,230,255,0.48);
  --frost-low:  rgba(210,230,255,0.22);
  --frost-ghost:rgba(210,230,255,0.06);

  /* Legacy border aliases → blue */
  --border:     rgba(59,158,255,0.14);
  --border-hi:  rgba(59,158,255,0.34);
  --sky:        #3b9eff;
  --sky-dim:    #1a4a8a;
  --sky-glow:   rgba(59,158,255,0.18);
  --sky-subtle: rgba(59,158,255,0.07);

  /* Type */
  --font-ui:    'Cormorant Garamond', 'Georgia', serif;
  --font-mono:  'Space Mono', monospace;
  --font-sans:  'Inter', sans-serif;

  /* Easing */
  --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);

  /* Spike RGB vars — hours: violet-blue, minutes: cyan, seconds: ice-white */
  --h:  100,140,255;
  --m:  0,210,255;
  --s:  180,230,255;
  --blue: 59,158,255;
}

html, body {
  width: 100%; height: 100%;
  background: var(--ink);
  overflow: hidden;
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--frost);
}

/* ═══════════════════════════════════
   ROOT LAYOUT
   ═══════════════════════════════════ */
#root {
  position: relative;
  width: 100%; height: 100%;
}

/* Canvas area */
#cloudArea {
  position: absolute;
  top: 108px;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  display: block;
  cursor: grab;
  user-select: none;
  touch-action: none;
}
canvas:active { cursor: grabbing; }

/* ═══════════════════════════════════
   AMBIENT BG LAYERS
   ═══════════════════════════════════ */
#bgGlow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 55% 38% at 50% 52%,
      rgba(30,80,180,0.10) 0%,
      transparent 70%),
    radial-gradient(ellipse 90% 50% at 18% 0%,
      rgba(10,40,120,0.12) 0%,
      transparent 60%),
    radial-gradient(ellipse 70% 50% at 82% 100%,
      rgba(20,60,160,0.08) 0%,
      transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 10%,
      rgba(59,158,255,0.04) 0%,
      transparent 60%);
}

/* ═══════════════════════════════════
   TOP BAR
   ═══════════════════════════════════ */
#canvasTop {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  pointer-events: none;
  padding: 16px 20px 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 7px;
}

/* Wordmark */
#wordmark {
  display: flex;
  align-items: center;
  gap: 10px;
  pointer-events: none;
  user-select: none;
}

#wordmark-logo {
  width: 22px;
  height: 22px;
  position: relative;
  flex-shrink: 0;
}

#wordmark-logo svg {
  width: 100%;
  height: 100%;
}

#wordmark-text {
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.28em;
  color: rgba(200,225,255,0.78);
  text-transform: uppercase;
  white-space: nowrap;
}

#wordmark-sep {
  width: 1px;
  height: 11px;
  background: var(--gold-border);
  margin: 0 2px;
}

#wordmark-sub {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.16em;
  color: rgba(59,158,255,0.44);
  text-transform: lowercase;
  white-space: nowrap;
}

/* Status row */
#statusRow {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 20px;
  pointer-events: none;
}

#stateDot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(59,158,255,0.30);
  flex-shrink: 0;
  transition: background 0.5s, box-shadow 0.5s;
}
#stateDot.active {
  background: rgb(var(--s));
  box-shadow: 0 0 0 3px rgba(180,230,255,0.14), 0 0 12px rgba(59,158,255,0.6);
  animation: dotPulse 1.4s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(59,158,255,0.14), 0 0 10px rgba(59,158,255,0.45); }
  50%      { box-shadow: 0 0 0 5px rgba(59,158,255,0.06), 0 0 22px rgba(59,158,255,0.22); }
}

#phaseLabel {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.20em;
  color: rgba(180,215,255,0.24);
  text-transform: lowercase;
  transition: color 0.5s;
}
#phaseLabel.bright { color: rgba(180,215,255,0.62); }

/* Controls row */
#controlsRow {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  pointer-events: all;
}

/* Mode toggle */
#modeToggle {
  display: flex;
  align-items: center;
  gap: 2px;
  background: rgba(59,158,255,0.04);
  border: 1px solid var(--gold-border);
  border-radius: 8px;
  padding: 3px;
}
.mbtn {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(180,215,255,0.30);
  background: transparent;
  border: none;
  border-radius: 5px;
  padding: 6px 12px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  white-space: nowrap;
}
.mbtn.active {
  background: rgba(59,158,255,0.16);
  color: rgba(210,235,255,0.90);
}
.mbtn:not(.active):hover {
  color: rgba(180,215,255,0.58);
  background: rgba(59,158,255,0.07);
}

/* Theme picker */
#themePicker {
  display: flex;
  align-items: center;
  gap: 8px;
}
.tswatch {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.tswatch:hover  { transform: scale(1.25); }
.tswatch.active {
  border-color: rgba(210,235,255,0.75);
  box-shadow: 0 0 0 3px rgba(59,158,255,0.18);
  transform: scale(1.20);
}
#tsBlue   { background: radial-gradient(circle at 35% 35%, #90c8ff, #1a6ed8); }
#tsRed    { background: radial-gradient(circle at 35% 35%, #ffb0b0, #e02244); }
#tsGreen  { background: radial-gradient(circle at 35% 35%, #aaffc8, #18c860); }
#tsYellow { background: radial-gradient(circle at 35% 35%, #fff4a8, #e0b800); }

/* ═══════════════════════════════════
   BOTTOM SHEET (mobile)
   ═══════════════════════════════════ */
#sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  padding: 0 28px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: linear-gradient(
    to top,
    rgba(2,4,8,1.0) 0%,
    rgba(2,4,8,0.96) 40%,
    rgba(2,4,8,0.0)  100%
  );
  pointer-events: none;
}

#sheetInner {
  pointer-events: all;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding-top: 48px;
}

/* ═══════════════════════════════════
   DESKTOP SIDE PANEL
   ═══════════════════════════════════ */
@media (min-width: 800px) and (orientation: landscape) {
  #cloudArea {
    top: 0;
    right: 300px;
  }
  #canvasTop {
    right: 300px;
    padding: 20px 26px 0;
  }
  #sheet {
    position: absolute;
    left: auto; bottom: 0; top: 0; right: 0;
    width: 300px;
    background: rgba(2,4,8,0.97);
    border-left: 1px solid rgba(59,158,255,0.12);
    padding: 0 32px;
    padding-top: max(30px, env(safe-area-inset-top, 30px));
    padding-bottom: max(30px, env(safe-area-inset-bottom));
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    overflow-y: auto;
    pointer-events: all;
  }
  #sheetInner {
    align-items: flex-start;
    justify-content: center;
    min-height: 100%;
    height: auto;
    padding-top: 0;
    gap: 0;
  }
}

/* ═══════════════════════════════════
   TIME DISPLAY
   ═══════════════════════════════════ */
#timeDisplay {
  font-family: var(--font-ui);
  font-weight: 300;
  font-style: italic;
  font-size: clamp(42px, 10vw, 62px);
  letter-spacing: -0.01em;
  color: rgba(210,235,255,0.97);
  line-height: 1;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.9s var(--ease-out), transform 0.9s var(--ease-out);
  user-select: none;
  margin-top: 0;
  margin-bottom: 2px;
  text-shadow: 0 0 40px rgba(59,158,255,0.28), 0 0 80px rgba(30,80,200,0.18);
}
#timeDisplay.show { opacity:1; transform:translateY(0); }

@media (min-width: 800px) and (orientation: landscape) {
  #timeDisplay {
    font-size: clamp(30px, 3.8vw, 52px);
    margin-top: 6px;
    margin-bottom: 6px;
  }
}

/* ═══════════════════════════════════
   DATE DISPLAY
   ═══════════════════════════════════ */
#dateDisplay {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  color: rgba(59,158,255,0.58);
  margin-bottom: 16px;
  opacity: 0;
  transition: opacity 0.6s 0.15s;
  text-transform: uppercase;
}
#dateDisplay.show { opacity: 1; }

/* ═══════════════════════════════════
   LEGEND
   ═══════════════════════════════════ */
#legend {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  opacity: 0;
  transition: opacity 0.6s 0.2s;
  margin-bottom: 20px;
  max-width: 240px;
}
#legend.show { opacity: 1; }

@media (min-width: 800px) and (orientation: landscape) {
  #legend {
    max-width: 100%;
    gap: 14px;
    margin-bottom: 24px;
  }
}

.litem {
  display: grid;
  grid-template-columns: 18px 1fr 34px;
  align-items: center;
  gap: 14px;
}

.lkey {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.10em;
  font-weight: 700;
  opacity: 0.85;
}

.ltrack {
  height: 1px;
  background: rgba(59,158,255,0.12);
  border-radius: 2px;
  overflow: hidden;
}
.lfill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 1s var(--ease-out);
}

.lval {
  font-family: var(--font-mono);
  font-size: 9px;
  color: rgba(180,215,255,0.42);
  text-align: right;
  letter-spacing: 0.06em;
}

/* ═══════════════════════════════════
   OBSERVE BUTTON — PREMIUM GOLD
   ═══════════════════════════════════ */
#btn {
  position: relative;
  background: transparent;
  border: 1px solid rgba(59,158,255,0.32);
  border-radius: 3px;
  padding: 0;
  height: 52px;
  min-width: 196px;
  cursor: pointer;
  outline: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: border-color 0.35s, box-shadow 0.35s, transform 0.2s;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* Hairline corner accents — blue ice signature */
#btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(59,158,255,0.10) 0%,
    rgba(59,158,255,0.04) 40%,
    transparent 65%
  );
  border-radius: inherit;
  transition: opacity 0.35s;
}

/* Top specular line */
#btn::after {
  content: '';
  position: absolute;
  top: 0; left: 22%; right: 22%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,225,255,0.18), transparent);
}

.btn-orb {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px rgba(59,158,255,0.65), 0 0 20px rgba(59,158,255,0.30);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
}

.btn-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.32em;
  color: rgba(180,215,255,0.62);
  text-transform: uppercase;
  transition: color 0.25s;
  padding-left: 2px;
}

@media (hover: hover) {
  #btn:not(:disabled):hover {
    border-color: rgba(59,158,255,0.62);
    box-shadow: 0 0 0 1px rgba(59,158,255,0.08),
                0 6px 32px rgba(20,60,160,0.35),
                0 0 28px rgba(59,158,255,0.15);
    transform: translateY(-1px);
  }
  #btn:not(:disabled):hover .btn-label { color: rgba(210,235,255,0.92); }
  #btn:not(:disabled):hover .btn-orb {
    background: var(--gold-warm);
    box-shadow: 0 0 18px rgba(59,158,255,0.80), 0 0 36px rgba(59,158,255,0.40);
    transform: scale(1.3);
  }
}

#btn:not(:disabled):active {
  transform: scale(0.96);
  box-shadow: none;
}
#btn:disabled {
  opacity: 0.22;
  cursor: default;
  border-color: rgba(180,215,255,0.05);
}

/* ═══════════════════════════════════
   HINT TEXT
   ═══════════════════════════════════ */
#hint {
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(180,215,255,0.13);
  text-transform: uppercase;
  text-align: center;
}
@media (min-width: 800px) and (orientation: landscape) {
  #hint { text-align: left; margin-top: 10px; }
}

/* ═══════════════════════════════════
   ZOOM CONTROLS
   ═══════════════════════════════════ */
#zoomBar {
  position: absolute;
  top: 114px;
  right: 14px;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
@media (min-width: 800px) and (orientation: landscape) {
  #zoomBar {
    top: 26px;
    right: 316px;
  }
}

.zbtn {
  width: 36px; height: 36px;
  background: rgba(2,4,8,0.82);
  border: 1px solid rgba(59,158,255,0.16);
  border-radius: 4px;
  color: rgba(180,215,255,0.40);
  font-family: var(--font-mono);
  font-size: 15px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.zbtn:hover {
  background: rgba(59,158,255,0.10);
  border-color: rgba(59,158,255,0.36);
  color: rgba(210,235,255,0.88);
}
.zbtn:active { transform: scale(0.90); }

#zLvl {
  font-family: var(--font-mono);
  font-size: 8px;
  color: rgba(180,215,255,0.22);
  letter-spacing: 0.04em;
  height: 18px;
  display: flex;
  align-items: center;
  user-select: none;
}

/* ═══════════════════════════════════
   TOAST
   ═══════════════════════════════════ */
#toast {
  position: fixed;
  left: 50%; bottom: 88px;
  transform: translateX(-50%) translateY(6px);
  background: rgba(2,4,8,0.94);
  border: 1px solid rgba(59,158,255,0.18);
  border-radius: 3px;
  padding: 6px 16px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.20em;
  color: rgba(180,215,255,0.42);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 99;
  white-space: nowrap;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════
   FLASH OVERLAY
   ═══════════════════════════════════ */
#flash {
  position: fixed; inset: 0;
  background: rgba(120,190,255,0);
  pointer-events: none;
  z-index: 98;
}

/* ═══════════════════════════════════
   VIGNETTE
   ═══════════════════════════════════ */
#vig {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 42% 50%,
    transparent 22%, rgba(2,4,8,0.80) 100%);
  pointer-events: none;
  z-index: 2;
}
@media (min-width: 800px) and (orientation: landscape) {
  #vig {
    background: radial-gradient(ellipse at 35% 50%,
      transparent 24%, rgba(8,9,13,0.58) 100%);
  }
}

/* ═══════════════════════════════════
   CORNER MARKS — gold hairlines (signature)
   ═══════════════════════════════════ */
.cm { display: none; }

@media (min-width: 800px) and (orientation: landscape) {
  #cm-tr { right: 316px; }
  #cm-br { right: 316px; }
}

/* ═══════════════════════════════════
   PANEL HEADER (desktop only)
   ═══════════════════════════════════ */
#panelHeader {
  display: none;
}
@media (min-width: 800px) and (orientation: landscape) {
  #panelHeader {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(59,158,255,0.12);
    width: 100%;
  }
  #panelBrand {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.35em;
    color: rgba(59,158,255,0.48);
    text-transform: uppercase;
  }
  #panelTitle {
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: rgba(200,225,255,0.76);
    letter-spacing: 0.02em;
  }
}

/* ═══════════════════════════════════
   SCAN LINE AMBIANCE
   ═══════════════════════════════════ */
#scanLine {
  position: fixed;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(59,158,255,0.04) 20%,
    rgba(59,158,255,0.10) 50%,
    rgba(59,158,255,0.04) 80%,
    transparent 100%);
  pointer-events: none;
  z-index: 5;
  animation: scanMove 18s linear infinite;
  opacity: 0.60;
}
@keyframes scanMove {
  0%   { top: -1px; }
  100% { top: 100%; }
}



/* ═══════════════════════════════════
   FILM GRAIN OVERLAY
   ═══════════════════════════════════ */
#grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 6;
  opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size: 180px 180px;
}

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  #scanLine { display: none; }
  #bezelRing::before { animation: none; }
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div id="bgGlow"></div>
<div id="scanLine"></div>
<div id="flash"></div>
<div id="vig"></div>
<div id="grain"></div>
<div class="cm" id="cm-tl"></div>
<div class="cm" id="cm-tr"></div>
<div class="cm" id="cm-bl"></div>
<div class="cm" id="cm-br"></div>
<div id="toast"></div>

<div id="root">

  <!-- Top canvas overlay -->
  <div id="canvasTop">

    <!-- Back to landing -->
    <a href="index.html" id="backLink" style="
      display:inline-flex;align-items:center;gap:6px;
      font-family:'Space Mono',monospace;font-size:8px;letter-spacing:0.20em;
      text-transform:uppercase;color:rgba(59,158,255,0.45);text-decoration:none;
      pointer-events:all;transition:color 0.2s;margin-bottom:4px;
    " onmouseover="this.style.color='rgba(107,191,255,0.85)'" onmouseout="this.style.color='rgba(59,158,255,0.45)'">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </a>

    <!-- Wordmark -->
    <div id="wordmark">
      <div id="wordmark-logo">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Atom ring -->
          <ellipse cx="11" cy="11" rx="9" ry="3.6" stroke="rgba(59,158,255,0.55)" stroke-width="0.8"/>
          <ellipse cx="11" cy="11" rx="9" ry="3.6" stroke="rgba(59,158,255,0.55)" stroke-width="0.8" transform="rotate(60 11 11)"/>
          <ellipse cx="11" cy="11" rx="9" ry="3.6" stroke="rgba(59,158,255,0.55)" stroke-width="0.8" transform="rotate(120 11 11)"/>
          <!-- Nucleus -->
          <circle cx="11" cy="11" r="1.8" fill="rgba(59,158,255,0.90)"/>
          <circle cx="11" cy="11" r="0.7" fill="rgba(210,235,255,0.98)"/>
        </svg>
      </div>
      <span id="wordmark-text">Quanta</span>

    <div id="statusRow">
